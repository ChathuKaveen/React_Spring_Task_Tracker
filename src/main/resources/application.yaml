spring:
  application:
    name: Task-Management
  datasource:
    url: jdbc:mysql://localhost:3306/task_management?createDatabaseIfNotExist=true
    username: root
    password: root
  config:
    import: optional:file:.env[.properties]
  jpa:
    show-sql: true
  jwt:
    secret: ${JWT_SECRET}
    accessTokenExpiration: 900
    refreshTokenExpiration: 604800

